<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Iniciar Sesión - GastoInteligente</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <style>
      .container-card {
        background: linear-gradient(135deg, #4e73df 0%, #224abe 100%);
        height: auto;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      }
      .card-login {
        background: white;
        padding: 2rem 1rem;
        margin: 2rem;
        border-radius: 20px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
        width: 100%;
        max-width: 400px;
        display: column;
        align-items: center;
      }
      .btn-primary-custom {
        background: #4e73df;
        border: none;
        padding: 12px;
        font-weight: bold;
        border-radius: 10px;
        transition: all 0.3s;
      }
      .btn-primary-custom:hover {
        background: #224abe;
        transform: translateY(-2px);
      }
      .form-control {
        border-radius: 10px;
        padding: 12px;
        border: 1px solid #ddd;
      }
      .logo-icon {
        font-size: 3rem;
        color: #4e73df;
        margin-bottom: 1rem;
      }
      #mensaje {
        min-height: 24px;
        font-weight: 500;
      }
    </style>
  </head>
  <body>
    <nav class="navbar navbar-expand-lg navbar-light bg-light shadow-sm">
      <div class="container">
        <!-- LOGO -->
        <a class="navbar-brand fw-bold" href="index.html">
          💰 GastoInteligente
        </a>

        <!-- BOTONES -->
        <div class="d-flex gap-2">
          <a href="login.html" class="btn btn-outline-primary btn-sm">
            Iniciar Sesión
          </a>
          <a href="registro.html" class="btn btn-primary btn-sm">
            Registrarse
          </a>
        </div>
      </div>
    </nav>
    <section class="container-card">
      <div class="card-login text-center">
        <div class="logo-icon">💰</div>
        <h2 class="fw-bold mb-2">Bienvenido</h2>
        <p class="text-muted mb-4">Ingresa tus credenciales para continuar</p>

        <div class="text-start">
          <div class="mb-3">
            <label class="form-label small fw-bold">Correo Electrónico</label>
            <input
              type="email"
              id="email"
              class="form-control"
              placeholder="nombre@correo.com"
              oninput="validarEmail()"
            />
            <div class="invalid-feedback">Ingresa un correo válido.</div>
          </div>

          <div class="mb-4">
            <label class="form-label small fw-bold">Contraseña</label>
            <div class="input-group">
              <input
                type="password"
                id="password"
                class="form-control"
                placeholder="••••••••"
                oninput="validarPassword()"
              />
              <button
                class="btn btn-outline-secondary"
                type="button"
                onclick="togglePassword()"
              >
                <span id="eyeIcon">👁️</span>
              </button>
            </div>
            <div class="invalid-feedback">Mínimo 6 caracteres.</div>
          </div>
          <button
            id="btnLogin"
            onclick="entrar()"
            class="btn btn-primary btn-primary-custom w-100 mb-3 d-flex justify-content-center align-items-center gap-2"
          >
            <span id="btnText">Entrar al Panel</span>
            <span
              id="btnSpinner"
              class="spinner-border spinner-border-sm d-none"
              role="status"
            ></span>
          </button>
        </div>

        <p id="mensaje" class="small"></p>

        <hr />
        <p class="small text-muted mb-0">
          ¿No tienes cuenta?
          <a
            href="registro.html"
            class="text-primary fw-bold text-decoration-none"
            >Regístrate aquí</a
          >
        </p>
      </div>
    </section>
    <script>
      let isSubmitting = false;

      async function entrar() {
        if (isSubmitting) return; // 🚫 evita múltiples clicks

        const emailValido = validarEmail();
        const passwordValido = validarPassword();
        const mensajeDiv = document.getElementById("mensaje");

        if (!emailValido || !passwordValido) {
          mensajeDiv.innerText = "⚠️ Corrige los campos antes de continuar.";
          mensajeDiv.className = "small text-danger";
          return;
        }

        const email = document.getElementById("email").value;
        const password = document.getElementById("password").value;

        const urlReplit =
          "https://5025a3f7-5414-4235-a6d0-4e79ffff0d49-00-3bh2luvxxb3yg.worf.replit.dev/login";

        try {
          isSubmitting = true;
          setLoading(true);

          mensajeDiv.innerText = "Verificando...";
          mensajeDiv.className = "small text-primary";

          const respuesta = await fetch(urlReplit, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ email, password }),
          });

          const resultado = await respuesta.json();

          if (respuesta.ok) {
            localStorage.setItem(
              "usuarioLogueado",
              JSON.stringify(resultado.usuario),
            );

            mensajeDiv.innerText = "✅ ¡Acceso concedido! Redirigiendo...";
            mensajeDiv.className = "small text-success";

            setTimeout(() => {
              window.location.href = "dashboard.html";
            }, 1500);
          } else {
            mensajeDiv.innerText = "❌ " + resultado.feedback;
            mensajeDiv.className = "small text-danger";
          }
        } catch (error) {
          mensajeDiv.innerText = "❌ Error de conexión con el servidor.";
          mensajeDiv.className = "small text-danger";
        } finally {
          isSubmitting = false;
          setLoading(false);
        }
      }
      document.addEventListener("keydown", function (event) {
        if (event.key === "Enter") {
          entrar();
        }
      });
      function validarEmail() {
        const email = document.getElementById("email");
        const regex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

        if (!regex.test(email.value)) {
          email.classList.add("is-invalid");
          email.classList.remove("is-valid");
          return false;
        } else {
          email.classList.remove("is-invalid");
          email.classList.add("is-valid");
          return true;
        }
      }

      function validarPassword() {
        const password = document.getElementById("password");

        if (password.value.length < 6) {
          password.classList.add("is-invalid");
          password.classList.remove("is-valid");
          return false;
        } else {
          password.classList.remove("is-invalid");
          password.classList.add("is-valid");
          return true;
        }
      }
      function togglePassword() {
        const passwordInput = document.getElementById("password");
        const eyeIcon = document.getElementById("eyeIcon");

        const isHidden = passwordInput.type === "password";
        passwordInput.type = isHidden ? "text" : "password";
        eyeIcon.innerText = isHidden ? "🙈" : "👁️";
      }

      function setLoading(isLoading) {
        const btn = document.getElementById("btnLogin");
        const text = document.getElementById("btnText");
        const spinner = document.getElementById("btnSpinner");

        btn.disabled = isLoading;

        if (isLoading) {
          spinner.classList.remove("d-none");
          text.innerText = "Ingresando...";
        } else {
          spinner.classList.add("d-none");
          text.innerText = "Entrar al Panel";
        }
      }
      const usuario = JSON.parse(localStorage.getItem("usuarioLogueado"));

      const navActions = document.getElementById("navActions");

      if (usuario) {
        navActions.innerHTML = `
    <span class="me-2">Hola, ${usuario.nombre}</span>
    <a href="dashboard.html" class="btn btn-outline-primary btn-sm">Dashboard</a>
    <button onclick="cerrarSesion()" class="btn btn-danger btn-sm">Salir</button>
  `;
      } else {
        navActions.innerHTML = `
    <a href="login.html" class="btn btn-outline-primary btn-sm">Login</a>
    <a href="registro.html" class="btn btn-primary btn-sm">Registro</a>
  `;
      }
    </script>
  </body>
</html>
